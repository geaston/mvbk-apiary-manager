<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard | MVBK Apiary Manager</title>
  <link rel="stylesheet" href="../css/portal.css">
</head>
<body>
  <div id="portalNav"></div>
  <main class="portal-main">
    <header class="page-header">
      <p class="eyebrow">MVBK Apiary Manager</p>
      <h1>Dashboard</h1>
      <p id="welcomeText">Welcome to the member portal.</p>
    </header>

    <section class="dashboard-grid">
      <a class="dashboard-card" href="../index.html">
        <span class="card-icon">🗺️</span>
        <h2>Apiary Map</h2>
        <p>View approved apiaries, forage rings, and county context.</p>
      </a>
      <a class="dashboard-card" href="./my-apiaries.html">
        <span class="card-icon">🐝</span>
        <h2>My Apiaries</h2>
        <p>Review your apiary records and approval status.</p>
      </a>
      <a class="dashboard-card" href="./add-apiary.html">
        <span class="card-icon">➕</span>
        <h2>Add Apiary</h2>
        <p>Submit a new yard and private map location.</p>
      </a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/portal-common.js"></script>
  <script>
    MVBKPortal.initPage().then(({ session }) => {
      document.getElementById('welcomeText').textContent =
        `Signed in as ${session.user.email}.`;
    }).catch(MVBKPortal.showFatalError);
  </script>
</body>
</html>
